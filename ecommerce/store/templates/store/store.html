{% extends 'store/main.html' %}
{% load static %}
{% block content %}
    <div class="row">
        {% for product in products %}
            <div class="col-lg-4">
                <img class="thumbnail" src="{{ product.imageURL }}" alt="Placeholder Image">
                <div class="box-element product">
                    <h6 class="font-weight-bold">{{ product.name }}</h6>
                    <hr>
                    <button data-productId="{{ product.id }}" data-action="add" class="btn btn-outline-secondary update-cart">Add to Cart</button>
                    <a class="btn btn-outline-success disabled" href="#">View</a>
                    <h4 class="price">${{ product.price }}</h4>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock content %}
