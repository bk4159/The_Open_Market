{% extends 'store/main.html' %}
{% load static %}
{% block content %}
    <div class="row">
        <div class="col-lg-12">
            <div class="box-element">
                <a class="btn btn-outline-dark" href="{% url 'store' %}">&#x2190; Continue Shopping</a>

                <br>
                <br>

                <table class="table">
                    <tr>
                        <th><h5>Items: <span class="font-weight-bold">3</span></h5></th>
                        <th><h5>Total: <span class="font-weight-bold">$43</span></h5></th>
                        <th>
                            <a class="btn btn-success checkout" href="{% url 'checkout' %}">Checkout</a>
                        </th>
                    </tr>
                </table>
            </div>

            <br>

            <div class="box-element">
                <div class="cart-row">
                    <div class="l-cart-item"></div>
                    <div class="l-cart-item font-weight-bold">Item</div>
                    <div class="s-cart-item font-weight-bold">Price</div>
                    <div class="s-cart-item font-weight-bold">Quantity</div>
                    <div class="s-cart-item font-weight-bold">Total</div>
                </div>

                <div class="cart-row">
                    <div class="l-cart-item"><img class="row-image" src="{% static 'images/placeholder.png' %}" alt="Cart Item"></div>
                    <div class="l-cart-item">Product 1</div>
                    <div class="s-cart-item">$20</div>
                    <div class="s-cart-item">
                        <p class="quantity">2</p>
                        <div class="quantity">
                            <img class="chg-quantity" src="{% static 'images/arrow-up.png' %}" alt="Increase Quantity">
                            <img class="chg-quantity" src="{% static 'images/arrow-down.png' %}" alt="Decrease Quantity">
                        </div>
                    </div>
                    <div class="s-cart-item">$40</div>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
