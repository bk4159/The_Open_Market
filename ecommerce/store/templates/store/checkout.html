{% extends 'store/main.html' %}
{% load static %}
{% block content %}
    <div class="row">
        <div class="col-lg-6">
            <div class="box-element" id="form-wrapper">
                <form id="form">
                    <div id="user-info">
                        <div class="form-field">
							<input required class="form-control" type="text" autocomplete="name" name="name" placeholder="Name..">
						</div>
						<div class="form-field">
							<input required class="form-control" type="email" autocomplete="email" name="email" placeholder="Email..">
						</div>
                    </div>
                    <div id="shipping-info">
                        <hr>
						<p>Shipping Information:</p>
						<hr>
						<div class="form-field">
							<input class="form-control" type="text" autocomplete="street-address" name="address" placeholder="Address..">
						</div>
						<div class="form-field">
							<input class="form-control" type="text" autocomplete="address-level2" name="city" placeholder="City..">
						</div>
						<div class="form-field">
							<input class="form-control" type="text" autocomplete="address-level1" name="state" placeholder="State/Province/Region..">
						</div>
						<div class="form-field">
							<input class="form-control" type="text" autocomplete="postal-code" name="zipcode" placeholder="Zip/Postal code..">
						</div>
						<div class="form-field">
							<input class="form-control" type="text" autocomplete="country-name" name="country" placeholder="Country..">
						</div>
                    </div>

                    <hr>
                    <input id="form-button" class="btn btn-success btn-block" type="submit" value="Continue">
                </form>
            </div>
            <br>

            <div class="box-element hidden" id="payment-info">
                <small>Paypal options</small>

            </div>
        </div>

        <div class="col-lg-6">
            <div class="box-element">
                <a class="btn btn-outline-dark" href="{% url 'cart' %}">&#x2190; Back to Cart</a>
                <hr>
                <h3>Order Summary</h3>
                <hr>
                
                <div class="cart-row">
                    <div class="l-cart-item"><img class="row-image" src="{% static 'images/placeholder.png' %}" alt="Cart Item"></div>
                    <div class="l-cart-item">Product 1</div>
                    <div class="s-cart-item">$20.00</div>
                    <div class="s-cart-item">x2</div>
                </div>

                <h5>Items: 2</h5>
                <h5>Total: $40</h5>
            </div>
        </div>
    </div>
{% endblock content %}
